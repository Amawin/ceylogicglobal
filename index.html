<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLG Records</title>
    <style>
        /* මුළු සයිට් එකම Dark Theme කරන්න */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0e12;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* මැද තියෙන බොක්ස් එකේ Layout එක */
        .container {
            max-width: 600px;
            padding: 40px 20px;
        }

        /* ප්‍රධාන හෙඩින් එක */
        h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* සයිට් එකේ Tagline එක */
        p {
            font-size: 1.1rem;
            color: #8a8d98;
            line-height: 1.6;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Comming Soon / Live Badge එක */
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background-color: #1f212a;
            border: 1px solid #3f4252;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ff66; /* ලස්සන කොළ පාටක් */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Official Website</div>
        <h1>CeyLogicGlobal</h1>
        <p>CLG Records is an emerging independent record label and creative collective based in Sri Lanka, dedicated to empowering underground talent and shaping the future of alternative sounds.</p>
    </div>

</body>
</html>
